name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          python -m pytest tests/backend -v --tb=short --cov=backend --cov-report=term
        env:
          LOG_LEVEL: WARNING

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build

  knowledge-integrity:
    name: Knowledge data integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate expert_knowledge.json structure
        run: |
          python -c "
          import json
          with open('backend/knowledge_hub/expert_knowledge.json') as f:
              d = json.load(f)
          dtcs = d.get('dtc_knowledge', {})
          assert len(dtcs) >= 200, f'Expected >=200 DTCs, got {len(dtcs)}'
          for code, entry in dtcs.items():
              assert 'description_es' in entry, f'{code} missing description_es'
              cr = entry.get('cost_range_usd')
              if cr is not None:
                  assert isinstance(cr, list), f'{code}: cost_range_usd must be list'
          print(f'[OK] {len(dtcs)} DTCs validated')
          "
